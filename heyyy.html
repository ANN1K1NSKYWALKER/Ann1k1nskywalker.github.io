<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Hey Twin</title>
	<script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
</head>
<body>
	<center>
	<h1>Just a Lil Something I Made in 8th Grade</h1>
	<h2>Press Left Arrow to Restart :)</h2>
 <script>
 	//person getting decapitated
function setup() {
createCanvas(400, 400);
}

let x = 200
let y = 200



function draw() {
    x=x+1.5
    y=y-1.5
  if (keyIsDown(LEFT_ARROW)=== true){
  	x=200
  	y=200
  }
  background(220);
  noStroke()
  circle(200,150,15,15)
  circle(200,156,15,15)
  circle(195,156,15,15)
  circle(205,156,15,15)
  fill('white')
  circle (x,y-70,75)
  rect(196, 160, 10, 100);  
  rect(196, 180, 90, 10);
  rect(112, 180, 90, 10);
  stroke('white')
  strokeWeight(10);
  line(201,250,150, 375);
  line(201,245,255, 375);
  fill('red');
  stroke('red')
  strokeWeight(1)
  circle (x-20,y-70,15)
  circle(x+20,y-70,15)
  strokeWeight(5)
  line(x-20,y-50,x+20,y-50)
}
 </script>
 </center>
</body>
</html>
